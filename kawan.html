<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinkou - Sua Adega Online</title>
    <link rel="icon" type="image/png" href="addons/icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
    <style>

        /* Base do Design */
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #1a1a1a; color: white; }
        header { background: #ff4d00; padding: 20px; text-align: center; }

        
        /* Flex/Grid Responsivo */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* Onde vai ficar os card*/
        .card {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
            text-align: center;
            padding-bottom: 15px;
        }

        /*resposividade das telas piquenas */
        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .container { padding: 10px; }
        }

        /*Botão de Detalhes */
        .btn-Detalhes {
            background: #ff4d00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /*resposividade das telas piquenas */
        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .container { padding: 10px; }
        }

  
    </style>
</head>
<body>
    
     <div id="cursor-follower"></div>
     <script src="script.js"></script>

 <header class="topo">
    <img src="addons/drinkou-logo.png" alt="Logo Drinkou" class="logo">
  </header>

  /*img/valor/conteúdo das telas piquenas*/
  <div class="container">
    <div class="card">
        <img src="https://images.tcdn.com.br/img/img_prod/1053818/vinho_tinto_montes_alpha_malbec_1718_1_a477ea77b928e4baa711d0cb1ddf2eca.jpg" alt="Vinho Tinto">
        <h3>Vinho Tinto Malbec</h3>
        <p>R$ 180,00</p>
        <button class="btn-Detalhes">Mais Detalhes</button>
    </div>
    <div class="card">
        <img src="https://img.megaboxatacado.com.br/produto/1000X1000/2022524_id-VF4qT-qqCUAAAAAAAAKJ2Q.jpeg" alt="Cerveja Artesanal">
        <h3>Vinho Tinto Cabernet Sauvignon</h3> 
        <p>R$ 300,00</p>
        <button class="btn-Detalhes">Mais Detalhes</button>
    </div>
    <div class="card">
        <img src="https://chezfrance.vteximg.com.br/arquivos/ids/170938-278-440/vinho-tinto-frances-languedoc-bergerie-de-mussen.jpg?v=638940875660900000" alt="Whisky">
        <h3>Vinho Tinto Syrah</h3>
        <p>R$ 350,00</p>
        <button class="btn-Detalhes">Mais Detalhes</button>
    </div>
</div>



</body>
</html>
