<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinkou - Sua Adega Online</title>
    <link rel="icon" type="image/png" href="addons/icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
    <style>

        /* Base do Design */
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #1a1a1a; color: white; }
        header { background: #ff4d00; padding: 20px; text-align: center; }

        
        /* Flex/Grid Responsivo */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* Onde vai ficar os card*/
        .card {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
            text-align: center;
            padding-bottom: 15px;
        }

        /*resposividade das telas pequenas */
        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .container { padding: 10px; }
        }
        
        /*Formato das telas pequenas*/
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; }

        /*Botão de Detalhes */
        .btn-Detalhes {
            background: #f13535;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /*resposividade das telas pequenas */
        @media (max-width: 450px) {
            header h1 { font-size: 1.5rem; }
            .container { padding: 10px; }
        }

    </style>
</head>
<body>

 <header class="topo">
    <img src="addons/drinkou-logo.png" alt="Logo Drinkou" class="logo">

    <a href="index.html">Início</a>

    <a href="gross.html">Gross</a>
    <a href="kawan.html">Kawan</a>
  </nav>

  </header>

  <!--img/valor/conteúdo das telas pequenas-->
  <div class="container">

        <img src="img_kawan/vinho_img1.png" alt="Vinho Tinto">
        <h3>Vinho Tinto Malbec</h3>
        <p>R$ 180,00</p>
        <button class="btn-Detalhes">Mais Detalhes</button>
    </div>
    <div class="card">

    <div class="card">

    <div class="card">

</body>
</html>
