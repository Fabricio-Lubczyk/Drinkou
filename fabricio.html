<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drinkou - Fabricio</title>
    <link rel="icon" type="image/png" href="addons/icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
</head>
<body>
  <!-- parte de cima da home page -->
  <header class="topo">
    <img src="addons/drinkou-logo.png" alt="Logo Drinkou" class="logo">
  </header>

  <!-- menu do site com os integrantes -->
  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="fabricio.html">Fabricio</a>
    <a href="gross.html">Gross</a>
    <a href="kawan.html">Kawan</a>
  </nav>

  <!-- apresentação do site -->
  <section class="apresentacao">
      <h2>fabricio lindo</h2>
      <p>
        Aalcolatra dms
      </p>
  </section>

    <footer class="rodape">
      <div class="rodape-container">
          <div class="rodape-info">
              <img src="addons/drinkou-logo.png" alt="Logo Drinkou" class="logo-rodape">
              <p>O seu clube de degustação online. Explorando os melhores sabores e compartilhando experiências únicas.</p>
              <div class="redes-sociais">
                  <a href="#">Instagram</a>
                  <a href="#">Twitter</a>
                  <a href="#">YouTube</a>
              </div>
          </div>

          <div class="rodape-form-container">
              <h3>Sugira uma Bebida</h3>
              <form action="#" class="rodape-form">
                  <div class="input-group">
                      <input type="text" id="nome" required placeholder=" ">
                      <label for="nome">Seu Nome</label>
                  </div>
                  
                  <div class="input-group">
                      <input type="email" id="email" required placeholder=" ">
                      <label for="email">Seu E-mail</label>
                  </div>

                  <div class="input-group">
                      <select id="categoria" required>
                          <option value="" disabled selected>Escolha uma categoria</option>
                          <option value="vinho">Vinho</option>
                          <option value="cerveja">Cerveja Artesanal</option>
                          <option value="destilado">Destilado</option>
                          <option value="sem-alcool">Sem Álcool</option>
                      </select>
                  </div>

                  <button type="submit" class="btn-enviar">Enviar Sugestão</button>
              </form>
          </div>
      </div>

      <div class="rodape-direitos">
          <p>&copy; 2026 Drinkou. Desenvolvido por Fabricio, Gross e Kawan.</p>
      </div>
  </footer>
</body>
</html>
